<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">MathSolver AI</h1>
            <div id="nav-links">
                <button id="logout-btn" class="hidden bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-2xl">

        <!-- Auth Section -->
        <div id="auth-section" class="mt-10 bg-white p-8 rounded-lg shadow-md">
            <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-2 border rounded">
                <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded">
                <button id="auth-submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Login</button>
                <p class="text-center text-sm text-gray-600">
                    <span id="auth-toggle-text">Don't have an account?</span>
                    <a href="#" id="auth-toggle" class="text-blue-600 hover:underline">Sign Up</a>
                </p>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden mt-10 space-y-6">
            <div class="bg-white p-6 rounded-lg shadow-md text-center">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">Solve a New Problem</h2>
                <div class="flex flex-col items-center space-y-4">
                    <label class="w-full cursor-pointer bg-blue-50 border-2 border-dashed border-blue-200 p-8 rounded-lg hover:bg-blue-100 transition">
                        <input type="file" id="file-upload" class="hidden" accept="image/*,.pdf" capture="environment">
                        <div class="flex flex-col items-center">
                            <svg class="w-12 h-12 text-blue-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            <span class="text-blue-600 font-medium">Take Photo or Upload Image/PDF</span>
                            <span class="text-xs text-gray-500 mt-1">Supports PNG, JPG, PDF</span>
                        </div>
                    </label>
                    <div id="upload-status" class="text-sm text-gray-600 italic"></div>
                </div>
            </div>

            <div id="history-container" class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="font-semibold mb-4 text-gray-700 border-b pb-2">Your History</h3>
                <div id="history-list" class="space-y-2">
                    <!-- History items will be injected here -->
                </div>
            </div>
        </div>

        <!-- PDF Page Picker -->
        <div id="pdf-picker-section" class="hidden mt-10 bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Select a Page to Solve</h2>
            <div id="pdf-pages-grid" class="grid grid-cols-2 gap-4">
                <!-- PDF pages will be injected here -->
            </div>
            <button id="cancel-pdf" class="mt-6 w-full text-gray-600 py-2 border rounded hover:bg-gray-50">Cancel</button>
        </div>

        <!-- Solution Section -->
        <div id="solution-section" class="hidden mt-10 bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-start mb-4">
                <h2 class="text-xl font-bold text-gray-800">Step-by-Step Solution</h2>
                <button id="back-to-dashboard" class="text-blue-600 text-sm hover:underline">Back to Dashboard</button>
            </div>

            <div class="mb-6 p-4 bg-gray-50 rounded border flex justify-center">
                <img id="solution-image" src="" alt="Problem" class="max-h-64 rounded shadow-sm">
            </div>

            <div id="solution-content" class="prose prose-blue max-w-none text-gray-700">
                <!-- AI Solution Markdown will be rendered here -->
            </div>

            <div class="mt-8 pt-6 border-t flex flex-col space-y-4">
                <button id="copy-solution" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded flex items-center justify-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                    Copy Solution
                </button>
                <button id="share-link" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded flex items-center justify-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                    Share with Friend
                </button>
            </div>
        </div>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
